<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="kd_bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <filter id="kd_shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="3" dy="5" stdDeviation="4" flood-opacity="0.4" />
    </filter>
  </defs>
  
  <!-- Modern gradient background -->
  <rect width="128" height="128" rx="28" fill="url(#kd_bg_grad)" />
  
  <!-- Dashed Element Box representation - resized to add border padding -->
  <rect x="16" y="16" width="96" height="96" rx="14" fill="none" stroke="#ffffff" stroke-width="8" stroke-dasharray="12 8" opacity="0.9" />
  
  <!-- Eye icon representing visibility/hiding - resized to add border padding -->
  <path d="M28 64 C40 39, 88 39, 100 64 C88 89, 40 89, 28 64 Z" fill="none" stroke="#ffffff" stroke-width="8" stroke-linejoin="round" />
  <circle cx="64" cy="64" r="12" fill="#ffffff" />
  
  <!-- Red slash representing exclusion/hiding - resized to add border padding -->
  <line x1="24" y1="24" x2="104" y2="104" stroke="#f43f5e" stroke-width="10" stroke-linecap="round" filter="url(#kd_shadow)" />
</svg>
